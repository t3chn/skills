version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - goconst
    - gocognit

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
    gocognit:
      min-complexity: 15

issues:
  exclude-dirs:
    - vendor
  uniq-by-line: true
