repos:
  # Python (ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-check
        args: ['--fix']
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # TypeScript/JavaScript (biome) - local hook
  - repo: local
    hooks:
      - id: biome-check
        name: Biome lint & format
        entry: bash -c 'if command -v npx &> /dev/null && ([ -f biome.json ] || ls */biome.json 2>/dev/null); then npx @biomejs/biome check --write . || true; fi'
        language: system
        types_or: [ts, tsx, js, jsx]
        pass_filenames: false

  # Go (golangci-lint)
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.62.2
    hooks:
      - id: golangci-lint
        args: ['--fix']
        types: [go]

  # Rust (cargo fmt + clippy) - local hooks
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Cargo format
        entry: bash -c 'if [ -f Cargo.toml ]; then cargo fmt --all; fi'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: Cargo clippy
        entry: bash -c 'if [ -f Cargo.toml ]; then cargo clippy --all-targets -- -D warnings || true; fi'
        language: system
        types: [rust]
        pass_filenames: false

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        stages: [pre-commit, pre-push]

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, ci]

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ['--unsafe']  # Allow custom tags
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']

  # Tests (pre-push only)
  - repo: local
    hooks:
      - id: run-tests
        name: Run tests
        entry: bash scripts/run-tests.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
