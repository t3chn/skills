# Production CI Pipeline Template
# Copy to your project's .github/workflows/ci.yml
#
# Features:
# - Pre-commit checks (linting, formatting)
# - Type checking (mypy, tsc)
# - Security scanning (Semgrep, Bandit)
# - Tests with coverage
# - Language auto-detection
#
# Customize:
# - Uncomment language-specific sections
# - Adjust test commands for your setup
# - Add deployment steps as needed

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Cache keys
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  GO_VERSION: "1.23"

jobs:
  # ============================================
  # Pre-commit Checks (All Languages)
  # ============================================
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  # ============================================
  # Python Pipeline
  # ============================================
  python:
    runs-on: ubuntu-latest
    if: hashFiles('**/*.py', 'pyproject.toml', 'requirements*.txt') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Type check (mypy)
        run: uv run mypy . --ignore-missing-imports
        continue-on-error: true  # Remove after fixing type issues

      - name: Security scan (bandit)
        run: uv run bandit -r . -c pyproject.toml -q
        continue-on-error: true

      - name: Run tests
        run: uv run pytest --cov=. --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # TypeScript/Node Pipeline
  # ============================================
  typescript:
    runs-on: ubuntu-latest
    if: hashFiles('**/*.ts', '**/*.tsx', 'package.json', 'tsconfig.json') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run tsc --noEmit
        continue-on-error: true

      - name: Lint (Biome)
        run: bun run biome check .
        continue-on-error: true

      - name: Run tests
        run: bun test --coverage

  # ============================================
  # Go Pipeline
  # ============================================
  go:
    runs-on: ubuntu-latest
    if: hashFiles('**/*.go', 'go.mod') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out

  # ============================================
  # Rust Pipeline
  # ============================================
  rust:
    runs-on: ubuntu-latest
    if: hashFiles('**/*.rs', 'Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  # ============================================
  # Security Scanning (All Languages)
  # ============================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Summary Job
  # ============================================
  ci-success:
    runs-on: ubuntu-latest
    needs: [pre-commit, security]
    # Add language jobs to needs as you enable them:
    # needs: [pre-commit, security, python, typescript, go, rust]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.pre-commit.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed"
